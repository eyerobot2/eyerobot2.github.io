<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="250" viewBox="0 0 700 250" role="img" aria-labelledby="title desc">
  <title id="title">Simulation evaluation success rates</title>
  <desc id="desc">Simulation average and six simulation task success rates for No Gaze, Ego plus Wrist, and AVF.</desc>
  <defs>
    <pattern id="avf-hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#f2986f"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#fff" stroke-width="1.2"/>
    </pattern>
    <style>
      text { font-family: "Avenir Next", Avenir, "Open Sans", sans-serif; fill: #171717; letter-spacing: 0; }
      .legend { font-size: 13px; }
      .section-label { font-size: 14px; fill: #555; }
      .axis-label { font-size: 12px; }
      .task-label { font-size: 13px; }
      .value { font-size: 11px; text-anchor: middle; }
      .grid { stroke: #e9e9e9; stroke-width: 1; }
      .axis { stroke: #222; stroke-width: 1; }
    </style>
  </defs>

  <rect width="700" height="250" fill="#fff"/>

  <g class="legend">
    <rect x="120" y="7" width="12" height="12" fill="#7fc0a3"/>
    <text x="140" y="18">No Gaze (Stereo Only)</text>
    <rect x="309" y="7" width="12" height="12" fill="#5c8fc5"/>
    <text x="329" y="18">Ego + Wrist (3 Cameras)</text>
    <rect x="520" y="7" width="12" height="12" fill="url(#avf-hatch)"/>
    <text x="540" y="18">AVF (Stereo Only)</text>
  </g>

  <text class="section-label" x="96" y="43" text-anchor="middle">Average</text>
  <text class="section-label" x="414" y="43" text-anchor="middle">1800 trials</text>

  <g class="grid">
    <line x1="48" y1="60" x2="682" y2="60"/>
    <line x1="48" y1="96" x2="682" y2="96"/>
    <line x1="48" y1="132" x2="682" y2="132"/>
    <line x1="48" y1="168" x2="682" y2="168"/>
  </g>
  <g class="axis">
    <line x1="48" y1="60" x2="48" y2="204"/>
    <line x1="48" y1="204" x2="682" y2="204"/>
    <line x1="166" y1="35" x2="166" y2="204" stroke="#888" stroke-width="2"/>
  </g>
  <g class="axis-label" text-anchor="end">
    <text x="42" y="64">100%</text>
    <text x="42" y="100">75%</text>
    <text x="42" y="136">50%</text>
    <text x="42" y="172">25%</text>
    <text x="42" y="208">0%</text>
  </g>
  <text class="axis-label" transform="translate(13 158) rotate(-90)">Success Rate</text>

  <!-- Simulation average: 54, 75, 74 -->
  <g>
    <rect x="75" y="126.24" width="18" height="77.76" fill="#7fc0a3"/>
    <rect x="93" y="96" width="18" height="108" fill="#5c8fc5"/>
    <rect x="111" y="97.44" width="18" height="106.56" fill="url(#avf-hatch)"/>
    <text class="value" x="84" y="121">54</text>
    <text class="value" x="102" y="91">75</text>
    <text class="value" x="120" y="92">74</text>
    <text class="task-label" x="102" y="225" text-anchor="middle">Avg.</text>
  </g>

  <!-- Simulation tasks: tape, pot, tiger, tray, plate, spoon -->
  <g>
    <rect x="181" y="124.8" width="18" height="79.2" fill="#7fc0a3"/>
    <rect x="199" y="87.36" width="18" height="116.64" fill="#5c8fc5"/>
    <rect x="217" y="90.24" width="18" height="113.76" fill="url(#avf-hatch)"/>
    <text class="value" x="190" y="119">55</text><text class="value" x="208" y="82">81</text><text class="value" x="226" y="85">79</text>
    <text class="task-label" x="208" y="225" text-anchor="middle">tape</text>

    <rect x="261" y="104.64" width="18" height="99.36" fill="#7fc0a3"/>
    <rect x="279" y="74.4" width="18" height="129.6" fill="#5c8fc5"/>
    <rect x="297" y="72.96" width="18" height="131.04" fill="url(#avf-hatch)"/>
    <text class="value" x="270" y="99">69</text><text class="value" x="288" y="69">90</text><text class="value" x="306" y="67">91</text>
    <text class="task-label" x="288" y="225" text-anchor="middle">pot</text>

    <rect x="341" y="78.72" width="18" height="125.28" fill="#7fc0a3"/>
    <rect x="359" y="65.76" width="18" height="138.24" fill="#5c8fc5"/>
    <rect x="377" y="62.88" width="18" height="141.12" fill="url(#avf-hatch)"/>
    <text class="value" x="350" y="73">87</text><text class="value" x="368" y="60">96</text><text class="value" x="386" y="57">98</text>
    <text class="task-label" x="368" y="225" text-anchor="middle">tiger</text>

    <rect x="421" y="140.64" width="18" height="63.36" fill="#7fc0a3"/>
    <rect x="439" y="81.6" width="18" height="122.4" fill="#5c8fc5"/>
    <rect x="457" y="91.68" width="18" height="112.32" fill="url(#avf-hatch)"/>
    <text class="value" x="430" y="135">44</text><text class="value" x="448" y="76">85</text><text class="value" x="466" y="86">78</text>
    <text class="task-label" x="448" y="225" text-anchor="middle">tray</text>

    <rect x="501" y="144.96" width="18" height="59.04" fill="#7fc0a3"/>
    <rect x="519" y="97.44" width="18" height="106.56" fill="#5c8fc5"/>
    <rect x="537" y="103.2" width="18" height="100.8" fill="url(#avf-hatch)"/>
    <text class="value" x="510" y="139">41</text><text class="value" x="528" y="92">74</text><text class="value" x="546" y="98">70</text>
    <text class="task-label" x="528" y="225" text-anchor="middle">plate</text>

    <rect x="581" y="166.56" width="18" height="37.44" fill="#7fc0a3"/>
    <rect x="599" y="165.12" width="18" height="38.88" fill="#5c8fc5"/>
    <rect x="617" y="160.8" width="18" height="43.2" fill="url(#avf-hatch)"/>
    <text class="value" x="590" y="161">26</text><text class="value" x="608" y="160">27</text><text class="value" x="626" y="155">30</text>
    <text class="task-label" x="608" y="225" text-anchor="middle">spoon</text>
  </g>
</svg>
